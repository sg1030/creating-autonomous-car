ekf_localization:
  ros__parameters:
    frequency: 100.0
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: false          # PF already publishes map→laser TF

    odom_frame:      odom
    base_link_frame: base_link
    world_frame:     map       # absolute pose in map frame

    # VESC wheel odometry: use twist only (vx, vyaw)
    odom0: /vesc/odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false, false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false

    # Particle filter pose: use position + yaw
    odom1: /pf/pose/odom
    odom1_config: [true,  true,  false,
                   false, false, true,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom1_differential: false
