trajectory_optimizer:
  ros__parameters:
    input_csv:     'centerline.csv'
    output_csv:    'global_waypoints.csv'
    safety_margin: 0.5   # [m]   minimum clearance from each wall
    v_max:         8.0    # [m/s] vehicle speed cap
    a_lat_max:     3.0    # [m/s^2] lateral grip limit (curvature -> v)
    a_long_max:    5.0    # [m/s^2] long. accel limit (fwd/bwd smoothing)
