gap_follow:
  ros__parameters:
    control_rate_hz:  50.0
    estop_min_dist:   0.5    # [m]
    estop_angle_deg: 30.0    # [deg]
    gf_bubble_radius: 0.3    # [m]
    gf_speed:         2.0    # [m/s]
    gf_max_steer:     0.4    # [rad]
    gf_max_range:    10.0    # [m]

wall_follow:
  ros__parameters:
    control_rate_hz:  50.0
    estop_min_dist:   0.5    # [m]
    estop_angle_deg: 30.0    # [deg]
    wf_target_dist:   0.8    # desired gap from right wall [m]
    wf_kp:            1.0
    wf_kd:            0.1
    wf_speed:         1.5    # [m/s]
    wf_max_steer:     0.4    # [rad]
    wf_lookahead:     0.5    # [m]
